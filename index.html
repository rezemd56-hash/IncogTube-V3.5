<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncogTube</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f0f0f;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #272727;
            --accent-purple: #a855f7;
            --accent-purple-hover: #9333ea;
            --accent-purple-light: #c084fc;
            --text-primary: #ffffff;
            --text-secondary: #aaaaaa;
            --text-tertiary: #717171;
            --border-color: #303030;
            --hover-bg: #2f2f2f;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: background 0.2s;
        }

        .menu-btn:hover {
            background-color: var(--hover-bg);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 900;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-purple) 0%, #7c3aed 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: bold;
        }

        .logo-accent {
            color: var(--accent-purple-light);
        }

        .search-section {
            flex: 1;
            max-width: 640px;
            margin: 0 40px;
            display: flex;
            align-items: center;
        }

        .search-container {
            display: flex;
            align-items: center;
            width: 100%;
            height: 40px;
        }

        .search-input-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px 0 0 20px;
            padding: 0 16px;
            height: 100%;
            transition: all 0.2s;
        }

        .search-input-wrapper:focus-within {
            border-color: var(--accent-purple);
        }

        .search-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            font-family: 'Roboto', sans-serif;
        }

        .search-input::placeholder {
            color: var(--text-tertiary);
        }

        .search-btn {
            width: 64px;
            height: 100%;
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 20px 20px 0;
            background-color: var(--bg-tertiary);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background-color: var(--hover-bg);
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple) 0%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
        }

        /* Main Layout */
        .main-container {
            display: flex;
            padding-top: 56px;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: var(--bg-primary);
            padding: 12px;
            position: fixed;
            left: 0;
            top: 56px;
            bottom: 0;
            overflow-y: auto;
            border-right: 1px solid var(--border-color);
            z-index: 100;
        }

        .nav-section {
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 400;
        }

        .nav-item:hover {
            background-color: var(--hover-bg);
        }

        .nav-item.active {
            background-color: var(--hover-bg);
            font-weight: 500;
        }

        .nav-icon {
            font-size: 20px;
            width: 24px;
            text-align: center;
        }

        .nav-section-title {
            padding: 8px 16px;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        /* Content */
        .content {
            flex: 1;
            margin-left: 240px;
            padding: 24px;
            background-color: var(--bg-primary);
            min-height: calc(100vh - 56px);
        }

        /* Chips */
        .chips-container {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 8px;
        }

        .chip {
            padding: 8px 16px;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
            user-select: none;
            border: none;
            font-family: inherit;
        }

        .chip:hover {
            background-color: var(--hover-bg);
            color: var(--text-primary);
        }

        .chip.active {
            background-color: var(--text-primary);
            color: var(--bg-primary);
        }

        /* Videos Grid */
        .videos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            min-height: 400px;
        }

        .video-card {
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .video-card:hover {
            transform: scale(1.02);
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.8);
            color: white;
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .video-info {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-purple) 0%, #7c3aed 100%);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-weight: 500;
        }

        .video-meta {
            flex: 1;
        }

        .video-title {
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 6px;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-channel {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .video-stats {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Player Modal */
        .player-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.98);
            z-index: 2000;
            padding: 20px;
        }

        .player-modal.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .player-wrapper {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }

        .player-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            background: #000;
        }

        .player-container iframe,
        .player-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -50px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.2s;
            z-index: 10;
        }

        .close-player:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .player-info {
            width: 100%;
            max-width: 1200px;
            margin-top: 20px;
            padding: 20px;
            background-color: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .player-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .player-channel {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Footer */
        .footer {
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            text-align: center;
            color: var(--text-tertiary);
            font-size: 13px;
        }

        .footer-brand {
            color: var(--accent-purple-light);
            font-weight: 500;
        }

        /* Loading */
        .loading {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 300px;
            color: var(--text-secondary);
            font-size: 16px;
            grid-column: 1 / -1;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border-color);
            border-top-color: var(--accent-purple);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error Message */
        .error-message {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
            grid-column: 1 / -1;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-message h3 {
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .retry-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: var(--accent-purple);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
        }

        .retry-btn:hover {
            background-color: var(--accent-purple-hover);
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .videos-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .content {
                margin-left: 0;
            }
            
            .search-section {
                margin: 0 10px;
            }
            
            .videos-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-tertiary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #444;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo-section">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
            <a href="#" class="logo" onclick="location.reload(); return false;">
                <div class="logo-icon">▶</div>
                <div>Incog<span class="logo-accent">Tube</span></div>
            </a>
        </div>

        <div class="search-section">
            <div class="search-container">
                <div class="search-input-wrapper">
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="Buscar videos..." 
                           onkeypress="handleKeyPress(event)">
                </div>
                <button class="search-btn" onclick="searchVideos()">🔍</button>
            </div>
        </div>

        <div class="user-section">
            <div class="user-avatar">C</div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="nav-section">
                <div class="nav-item active" onclick="loadTrending()">
                    <span class="nav-icon">🏠</span>
                    <span>Principal</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">🎬</span>
                    <span>Shorts</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📺</span>
                    <span>Suscripciones</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Tú</div>
                <div class="nav-item">
                    <span class="nav-icon">⏱️</span>
                    <span>Historial</span>
                </div>
                <div class="nav-item">
                    <span class="nav-icon">📁</span>
                    <span>Playlists</span>
                </div>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Explorar</div>

                    <span class="nav-icon">🎵</span>
                    <span>Música</span>
                </div>
                <div class="nav-item" onclick="searchByCategory('gaming')">
                    <span class="nav-icon">🎮</span>
                    <span>Videojuegos</span>
                </div>
                <div class="nav-item" onclick="searchByCategory('tech')">
                    <span class="nav-icon">💻</span>
                    <span>Tecnología</span>
                </div>
            </div>
        </aside>

        <!-- Content -->
        <main class="content">
            <!-- Chips -->
            <div class="chips-container">
                <button class="chip active" onclick="setActiveChip(this); loadTrending()">Todos</button>
                <button class="chip" onclick="setActiveChip(this); searchByCategory('music')">Música</button>
                <button class="chip" onclick="setActiveChip(this); searchByCategory('gaming')">Videojuegos</button>
                <button class="chip" onclick="setActiveChip(this); searchByCategory('programming')">Programación</button>
                <button class="chip" onclick="setActiveChip(this); searchByCategory('news')">Noticias</button>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <span>Cargando videos...</span>
            </div>

            <!-- Videos Grid -->
            <div class="videos-grid" id="videosGrid"></div>

            <!-- Footer -->
            <div class="footer">
                <p>Creado por <span class="footer-brand">Cuervita</span> • IncogTube 2026</p>
            </div>
        </main>
    </div>

    <!-- Player Modal -->
    <div class="player-modal" id="playerModal" onclick="closePlayerOnBackground(event)">
        <div class="player-wrapper" onclick="event.stopPropagation()">
            <button class="close-player" onclick="closePlayer()">✕</button>
            <div class="player-container" id="playerContainer">
                <!-- El reproductor se inserta aquí -->
            </div>
        </div>
        <div class="player-info" onclick="event.stopPropagation()">
            <h2 class="player-title" id="playerTitle">Título del video</h2>
            <p class="player-channel" id="playerChannel">Nombre del canal</p>
